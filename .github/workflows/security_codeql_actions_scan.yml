name: Security CodeQL actions scan

on:
  workflow_dispatch:
  schedule:
    - cron: "16 4 * * MON-FRI" # Every weekday at 04:16 UTC

jobs:
  security-codeql-actions-check:
    permissions:
      contents: read
      actions: read
      security-events: write
    name: Project security CodeQL actions scan
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_codeql_actions.yml@607c82f9fa98d1c35286644d7d70f13c50c4316b # v2.13.2 # WORKFLOW_VERSION
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
    secrets: inherit
