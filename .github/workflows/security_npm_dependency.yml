name: Security npm dependency check

on:
  workflow_dispatch:
  schedule:
    - cron: "16 4 * * MON-FRI" # Every weekday at 04:16 UTC

jobs:
  security-npm-dependency-check:
    name: Project security npm dependency check
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_npm_dependency.yml@d5f8cbb8085f8174be87bc5e2f4b610e785d984f # v2.14.11
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
      node_version_file: ".node-version"
    secrets: inherit
