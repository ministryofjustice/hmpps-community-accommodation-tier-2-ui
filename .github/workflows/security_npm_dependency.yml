name: Security npm dependency check

on:
  workflow_dispatch:
  schedule:
    - cron: "16 4 * * MON-FRI" # Every weekday at 04:16 UTC

jobs:
  security-npm-dependency-check:
    name: Project security npm dependency check
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_npm_dependency.yml@607c82f9fa98d1c35286644d7d70f13c50c4316b # v2.13.2 # WORKFLOW_VERSION
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
      node_version_file: ".node-version"
    secrets: inherit
