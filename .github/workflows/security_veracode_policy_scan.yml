name: Security veracode policy scan

on:
  workflow_dispatch:
  schedule:
    - cron: "54 4 * * 1" # Every Monday at 04:54 UTC

jobs:
  security-veracode-policy-check:
    name: Project security veracode policy scan
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_veracode_policy_scan.yml@8de783c7b6dc61ad8ba384924dc1fe93098d9995 # 2.13.1
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
    secrets: inherit
