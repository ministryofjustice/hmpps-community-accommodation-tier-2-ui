name: Security veracode policy scan

on:
  workflow_dispatch:
  schedule:
    - cron: "54 4 * * 1" # Every Monday at 04:54 UTC

jobs:
  security-veracode-policy-check:
    name: Project security veracode policy scan
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_veracode_policy_scan.yml@8d9c52e65720e36d445d9611f68ca4afd8494526 # v2.14.3
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
    secrets: inherit
