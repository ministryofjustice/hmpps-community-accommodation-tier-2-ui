name: Security veracode policy scan

on:
  workflow_dispatch:
  schedule:
    - cron: "54 4 * * 1" # Every Monday at 04:54 UTC

jobs:
  security-veracode-policy-check:
    name: Project security veracode policy scan
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_veracode_policy_scan.yml@607c82f9fa98d1c35286644d7d70f13c50c4316b # v2.13.2 # WORKFLOW_VERSION
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
    secrets: inherit
